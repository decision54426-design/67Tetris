<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICE CREAM</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin:0; padding:0; font-family: Arial; }
        body { background: linear-gradient(135deg, #ffdee9, #b5fffc); min-height: 100vh; padding: 5px; transition: 0.5s; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; }
        .layout { display: flex; gap: 5px; }
        .panel { width: 140px; background: rgba(255,255,255,0.8); border: 2px solid #ffccd5; border-radius: 8px; padding: 5px; font-size: 11px; }
        .center { width: 180px; }
        .btn { background: #ff6b8b; color: #fff; border: none; border-radius: 4px; padding: 2px 5px; font-size: 10px; font-weight: bold; }
        .btn:disabled { background: #ccc; }
        .ice { width: 75px; height: 75px; background: radial-gradient(#fff, #ffccd5); border: 2px solid #fff; border-radius: 50%; font-size: 38px; display: flex; justify-content: center; align-items: center; margin: 5px auto; transition: 0.05s; }
        .ice:active { transform: scale(0.9); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 10; }
        .box { background: #fff; padding: 15px; border-radius: 10px; text-align: center; border: 2px solid #ffccd5; }
    </style>
</head>
<body>
    <div class="overlay" id="ov"><div class="box"><h3>ENTER NAME</h3><input type="text" id="ni" style="margin:5px; padding:2px; text-align:center;"><br><button class="btn" onclick="st()">START</button></div></div>
    <h2 id="wt" style="font-size:14px; color:#ff6b8b;">1st WORLD</h2>
    <div class="layout">
        <div class="panel">
            <b>🌐 RANKING</b>
            <div style="color:#ff6b8b; font-weight:bold;">🥇 <span id="mn">YOU</span> (<span id="hi">0</span>)</div>
            <div>🥈 Cookie (10,000)</div>
        </div>
        <div class="center">
            <h1 id="sc" style="font-size:24px; color:#ff6b8b;">0</h1>
            <div style="font-size:10px; font-weight:bold;">CPS: <span id="cps">0</span> | RB: <span id="rb">0</span></div>
            <div class="ice" id="ib">🍨</div>
            <div class="panel" style="width:100%;">
                <b>👗 SKINS</b><br>
                <button class="btn" onclick="sk('🍨')">🍨</button>
                <button class="btn" id="sk1" onclick="sk('🍦')" disabled>🍦</button>
            </div>
            <div class="panel" style="width:100%; margin-top:2px;">
                <b>✨ WORLDS</b><br>
                <button class="btn" id="rbb" onclick="reborn()">REBORN (1k)</button>
                <button class="btn" id="w2b" onclick="w2()" disabled>2nd WORLD</button>
            </div>
        </div>
        <div class="panel">
            <b>🏪 SHOP</b>
            <button class="btn" onclick="buy(15, 0.1)">CHERRY (15)</button>
        </div>
    </div>
    <script>
        let score=0, cps=0, rb=0, w=1, h=localStorage.getItem('h')||0, name='Player';
        if(localStorage.getItem('n')) { document.getElementById('ov').style.display='none'; name=localStorage.getItem('n'); document.getElementById('mn').innerText=name; }
        function st(){ const v=document.getElementById('ni').value.trim(); name=v?v:'Player'; localStorage.setItem('n',name); document.getElementById('mn').innerText=name; document.getElementById('ov').style.display='none'; ui(); }
        function sk(e){ document.getElementById('ib').innerText=e; }
        function reborn(){ if(score>=1000){ score=0; cps=0; rb++; ui(); } }
        function w2(){ if(rb>=5){ w=2; document.getElementById('wt').innerText='🚀 2nd WORLD 🚀'; ui(); } }
        function buy(cost, amt){ if(score>=cost){ score-=cost; cps+=amt; ui(); } }
        function uBg() {
            if (w===2) document.body.style.background='linear-gradient(135deg, #4b0082, #000080)';
            else if(score>=500) document.body.style.background='linear-gradient(135deg, #ff9a9e, #fecfef)';
            else if(score>=100) document.body.style.background='linear-gradient(135deg, #a1c4fd, #c2e9fb)';
            else document.body.style.background='linear-gradient(135deg, #ffdee9, #b5fffc)';
        }
        function ui(){
            const m = w===2?2:1; document.getElementById('sc').innerText=Math.floor(score);
            document.getElementById('cps').innerText=(cps*m).toFixed(1); document.getElementById('rb').innerText=rb;
            document.getElementById('rbb').disabled=(score<1000); document.getElementById('w2b').disabled=(rb<5||w===2);
            document.getElementById('sk1').disabled=(rb<5); document.getElementById('hi').innerText=Math.floor(h); uBg();
        }
        document.getElementById('ib').addEventListener('touchstart',(e)=>{ e.preventDefault(); score+= (1+rb)*(w===2?2:1); if(score>h){ h=score; localStorage.setItem('h',h); } ui(); });
        setInterval(()=>{ score+=(cps*(w===2?2:1))/10; if(score>h){ h=score; localStorage.setItem('h',h); } ui(); },100); ui();
    </script>
</body>
</html>
